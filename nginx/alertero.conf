# Alertero Nginx Configuration
# Para usar en producción con HTTPS, reemplazar las secciones TLS según tu setup (Let's Encrypt, etc.)

# Logging
log_format alertero '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=webhook_limit:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;

# Upstream backend
upstream backend {
    server backend:8000 max_fails=3 fail_timeout=30s;
}

# HTTP Server (redirect to HTTPS in production)
server {
    listen 80;
    server_name _;
    
    access_log /var/log/nginx/alertero_access.log alertero;
    error_log /var/log/nginx/alertero_error.log warn;
    
    # En producción, descomentar para redirigir a HTTPS:
    # return 301 https://$host$request_uri;
    
    # Por ahora servir directamente en HTTP (desarrollo):
    include /etc/nginx/snippets/locations.conf;
}

