# Locations configuration - incluido tanto en HTTP como HTTPS server blocks

# Webhook endpoint - restringir IPs de Grafana
location /api/webhook/grafana {
    # IP allowlist - ajustar según tus IPs de Grafana
    # Descomentar y configurar en producción:
    # allow 10.0.0.0/8;         # Red interna
    # allow 172.16.0.0/12;      # Red interna
    # allow 192.168.0.0/16;     # Red interna
    # deny all;
    
    # Rate limiting más estricto en webhook
    limit_req zone=webhook_limit burst=20 nodelay;
    limit_req_status 429;
    
    # Proxy legacy path -> endpoint actual v1
    proxy_pass http://backend/api/v1/webhook/grafana;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    
    # Timeouts
    proxy_connect_timeout 10s;
    proxy_send_timeout 30s;
    proxy_read_timeout 30s;
}

# API endpoints
location /api/ {
    # compat: frontend viejo sin /v1
    rewrite ^/api/alerts/(.*)$ /api/v1/alerts/$1 break;
    rewrite ^/api/alerts$ /api/v1/alerts/current break;

    # Rate limiting general
    limit_req zone=api_limit burst=50 nodelay;
    limit_req_status 429;
    
    # Proxy al backend
    proxy_pass http://backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    
    # Timeouts
    proxy_connect_timeout 10s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;
    
    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
}

# Frontend static files
location / {
    root /usr/share/nginx/html;
    try_files $uri $uri/ /index.html;
    
    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    
    # No cache for index.html
    location = /index.html {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
    }
    
    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
}

# Health check (sin rate limiting)
location = /api/health/live {
    access_log off;
    proxy_pass http://backend/api/v1/health;
}
