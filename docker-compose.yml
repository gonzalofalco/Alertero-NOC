version: '3.7'

services:
  postgres:
    image: postgres:16-alpine
    container_name: alertero-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-alertero}
      POSTGRES_USER: ${POSTGRES_USER:-alertero}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - /var/lib/alertero/postgres:/var/lib/postgresql/data
    networks:
      - alertero-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-alertero}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: journald
      options:
        tag: alertero-postgres

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: alertero-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-alertero}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-alertero}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:?WEBHOOK_SECRET is required}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      ENVIRONMENT: ${ENVIRONMENT:-production}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - alertero-network
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/api/v1/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: journald
      options:
        tag: alertero-backend

  nginx:
    image: nginx:1.25-alpine
    container_name: alertero-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
      - "443:443"
    volumes:
      - ./nginx/alertero.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/locations.conf:/etc/nginx/snippets/locations.conf:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
      - /etc/alertero/secrets:/etc/nginx/ssl:ro
    depends_on:
      - backend
    networks:
      - alertero-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1/api/v1/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: journald
      options:
        tag: alertero-nginx

networks:
  alertero-network:
    driver: bridge
