# GitHub Actions CI/CD for Alertero

name: CI

on:
  push:
    branches: [ main, refactor/architecture, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: alertero_test
          POSTGRES_USER: alertero
          POSTGRES_PASSWORD: testpassword
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'
        cache-dependency-path: backend/requirements.txt
    
    - name: Install dependencies
      run: |
        cd backend
        pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Lint with ruff
      run: |
        cd backend
        ruff check app/ tests/
    
    - name: Format check with black
      run: |
        cd backend
        black --check app/ tests/
    
    - name: Type check with mypy
      run: |
        cd backend
        mypy app/ || true  # Don't fail on type errors for now
    
    - name: Run tests
      env:
        DATABASE_URL: postgresql://alertero:testpassword@localhost:5432/alertero_test
        WEBHOOK_SECRET: test-secret
        ENVIRONMENT: test
      run: |
        cd backend
        pytest tests/ -v --cov=app --cov-report=term-missing
    
    - name: Test database migrations
      env:
        DATABASE_URL: postgresql://alertero:testpassword@localhost:5432/alertero_test
        WEBHOOK_SECRET: test-secret
      run: |
        cd backend
        alembic upgrade head
        alembic downgrade base
        alembic upgrade head

  docker-build:
    runs-on: ubuntu-latest
    needs: lint-and-test
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Build Docker image
      run: |
        docker build -t alertero-backend:test ./backend
    
    - name: Test Docker image
      run: |
        docker run --rm alertero-backend:test python -c "import app; print('Import successful')"
